spring.application.name=tracking-service
server.port=${SERVER_PORT:8089}

spring.config.import=optional:configserver:${CONFIG_SERVER_URI:http://config-service:8888}
spring.cloud.config.retry.max-attempts=20
spring.cloud.config.retry.initial-interval=1000
spring.cloud.config.retry.max-interval=3000

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DATABASE:tracking_db}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:password}}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.hibernate.naming.physical-strategy=pe.edu.upc.tracking_service.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.baseline-version=1

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://eureka-service:8761/eureka/}
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:tracking-service}
eureka.instance.instance-id=${spring.application.name}:${server.port}

authorization.internal-service.secret=${INTERNAL_SERVICE_SECRET:internal-service-secret-key}

auth0.issuer-uri=${AUTH0_ISSUER_URI:https://auth0.local/}
auth0.audience=${AUTH0_AUDIENCE:jameofit-api}
legacy.jwt.enabled=${LEGACY_JWT_ENABLED:true}
legacy.jwt.issuer=${LEGACY_JWT_ISSUER:${JWT_ISSUER:iam-service}}
legacy.jwt.jwk-set-uri=${LEGACY_JWT_JWK_SET_URI:${JWT_JWKS_URI:http://iam-service:8081/api/v1/jwks/.well-known/jwks.json}}

spring.security.oauth2.resource-server.jwt.issuer-uri=${auth0.issuer-uri}
spring.security.oauth2.resource-server.jwt.jwk-set-uri=${legacy.jwt.jwk-set-uri}

services.profiles.base-url=${PROFILES_SERVICE_BASE_URL:http://profile-service}
services.recipes.base-url=${RECIPES_SERVICE_BASE_URL:http://recipe-service}
